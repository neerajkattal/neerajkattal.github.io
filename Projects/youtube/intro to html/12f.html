<!DOCTYPE html>
<html>
    <head>
        <title>12f work</title>

        <style>
            div{
                font-family: arial;
            }
            .border{
                background-color: rgb(169, 22, 228);
                color:white;
                display: flex;
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
                padding-left: 15px;
                padding-right: 15px;
                
            }
            .home{
                font-weight:bolder;
                
            }
            
         
            .box-style{
              
                border-radius: 15px;
                width:500px;
                border:none;
                font-size: 10px;
                padding-left: 20px;
                height: 30px;
                margin-top: 12px;
                margin-bottom: 12px;
            }

            button{
                border-radius: 2px;
                padding-top: 8px;
                padding-bottom: 8px;
                padding-left: 15px;
                padding-right: 15px;
                border-color: white;
                border: solid;
                border-width: 1px;
                color:white;
                font-size: 16px;
                border-style: solid;
                background-color: rgb(169, 22, 228); ;
            }
            


        </style>

    </head>
    <body>

        <div class="border">

            <div class="home">Home</div>
             <input class="box-style" type="textbox" placeholder="Search">
             <button>Download</button>




        </div>
    </body>

</html>
