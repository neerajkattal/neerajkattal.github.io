<!DOCTYPE html>
<html>
    <head>
        <title>
            14d exercise
        </title>
        <style>
            .sidebar{
                background-color: green;
                position:fixed;
                top:0;
                right: 0;
                bottom: 0;
                width: 100px;
                color:white;
            }
         
            .overlay{
                background-color: rgba(0,0,0,0.8);
                position: fixed;
                top:0;
                right: 0;
                bottom: 0;
                left:0;
                display: flex;
                justify-content: center;
                align-items: center;

            }

            .modal{
                background-color: white;
                width: 300px;
                height:100px;
                padding-top: 15px;
                padding-bottom: 15px;
                padding-left: 15px;
                padding-right: 15px;
                border-radius: 5px;
            }

        </style>



    </head>
    
    
    <body style="margin-bottom: 1000px;">
        <div class="sidebar">
            sidebar
            
        </div>
        <div class="overlay">
           

            <div class="modal">
                <div style="margin-bottom: 10px;">Modal Title</div>
                <div style="margin-bottom: 10px;">This is a modal</div>
                <div ><button>Close</button></div>

            </div>
        </div>



    </body>
</html>
