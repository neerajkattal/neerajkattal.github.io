<!DOCTYPE html>
<html>
    <head>
        <title>15e exercise</title>
        
        <style>
            .shirt-box{
                
                
                
                width:fit-content;
                box-shadow: 5px 5px 5px rgba(0,0,0,.25);
                position: relative;
                display: inline-block;
                
            }

             .discount{
                background-color: black;
                color:white;
                position: absolute;
                top: 2px;
                right: 0;
                font-size: 15px;
                padding-left: 10px;
                padding-right: 10px;
                padding-top: 7px;
                padding-bottom: 7px;
             }   

             .add-to-cart{
            
                position: absolute;
                bottom: 0;
                left: 0;
                right: 0;
                height: 80px;
                background-color: rgba(255, 255, 255, 0.8);
                display: flex;
                justify-content: center;
                align-items: center;
               
             }
             
        </style>
    </head>

    <body style="height:3000px;">
        <div class="shirt-box">
            <img class="shirt" src="images.jpeg">
            <div class="discount">
                20% OFF    
            </div>
            <div class="add-to-cart">
                <button style="
                        background-color: white;
                        border-width: 1px;
                        border-style: solid;
                        border-color: black;
                        padding-top: 10px;
                        padding-bottom: 10px;
                        padding-left: 15px;
                        padding-right: 15px;
                        
                         ">
                    Add to Cart
                </button>
            </div>
        </div>

    </body>
</html>
