<style>

    .stretch{
        background-color: green;
        color: white;
        border-style: none;
        padding-left: 20PX;
        padding-right: 20px;
        padding-bottom: 10px;
        padding-top: 10px;
        cursor: pointer;
        transition:  1s;
        margin-right: 20px;

    }

    .stretch:hover{
        padding-left: 50PX;
        padding-right: 50px;
        padding-bottom: 25px;
        padding-top: 25px;
       


    }
    
.shadow{
    background-color: green;
        color: white;
        border-style: none;
        padding-left: 20PX;
        padding-right: 20px;
        padding-bottom: 10px;
        padding-top: 10px;
        cursor: pointer;
        box-shadow: 3px 3px 5px rgba(0, 0, 0, 0.3);
}

.shadow:active{
    margin-top: 3px;
    margin-left: 3px;

    padding: 10px;
    box-shadow: none;
}

</style>


<button class="stretch">Stretch</button>
<button class="shadow">Shadow</button>
