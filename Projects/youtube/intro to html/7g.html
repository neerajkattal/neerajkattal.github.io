
<!DOCTYPE html>
<html>
    <head>
        <title>Twitter Text Box</title>
        <style>
            .cat-image{
                width:50px; 
                height: 50px;
                object-fit: cover;
                border-radius: 25px;
                border-top: 0px;
                margin-right: 5px;
                vertical-align: middle;
            }
            .textbox{
                border: none;
                font-size: 18px;
                width: 300px;
                vertical-align: middle;
            }
            .textbox:active{
                border: 50px;
            }
            
            .button{
                background-color: rgb(0, 195, 255);
                color:white;
                border:none;
                border-radius: 50px;
                vertical-align: middle;
                font-size: 10px;
                padding-left: 10px;
                padding-right: 10px;
                padding-top: 3px;
                padding-bottom: 3px;
                font-weight: bold;

            }
            .button:hover{
                cursor: pointer;

            }


        </style>


    </head>

    <body>
        <img class="cat-image" src="cat.jpg">
        
        <input class="textbox" type="insert" placeholder="What's happening?">

        <button class="button"> Tweet</button>


    </body>


</html>
